name: Backend Rust checks

on:
  pull_request:
    paths:
      - "src-tauri/**"
      - "src/core/backend/bindings.ts"
      - "rust-toolchain.toml"
      - ".github/workflows/backend-rust-checks.yml"
  push:
    branches: ["main"]
    paths:
      - "src-tauri/**"
      - "src/core/backend/bindings.ts"
      - "rust-toolchain.toml"
      - ".github/workflows/backend-rust-checks.yml"

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: "1.94.0"

jobs:
  # Light checks: run in parallel for fast feedback.
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt

      - name: cargo fmt (check)
        run: cargo fmt --all -- --check

      - name: Verify checks are non-mutating (clean git tree)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error title=Checks modified files::One or more check steps modified the repository."
            git status --short
            git --no-pager diff -- . || true
            exit 1
          fi

  typify-drift:
    name: typify generated schema up-to-date
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install cargo-typify (pinned)
        run: cargo install cargo-typify --version 0.5.0 --locked

      - name: Verify typify-generated schema is up-to-date (check-only)
        run: |
          tmp_file="$(mktemp)"
          trap 'rm -f "$tmp_file"' EXIT

          version="$(cargo-typify typify -V)"
          echo "Using $version"
          if [[ "$version" != "cargo-typify 0.5.0" ]]; then
            echo "::error title=Unexpected cargo-typify version::Expected cargo-typify 0.5.0, got $version"
            exit 1
          fi

          cargo-typify typify --no-builder schemas/plugin-manifest.schema.json -o "$tmp_file"

          if ! diff -u schemas/plugin-manifest.schema.rs "$tmp_file"; then
            echo "::error title=Generated schema out of date::Run: cd src-tauri && cargo typify --no-builder schemas/plugin-manifest.schema.json -o schemas/plugin-manifest.schema.rs and commit the result."
            exit 1
          fi

      - name: Verify checks are non-mutating (clean git tree)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error title=Checks modified files::One or more check steps modified the repository."
            git status --short
            git --no-pager diff -- . || true
            exit 1
          fi

  # Heavy compile lane: warm cache once, then reuse for compile-heavy jobs.
  cargo-check:
    name: cargo check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: ${{ format('backend-rust-{0}-{1}', runner.os, hashFiles('src-tauri/Cargo.lock')) }}

      - name: cargo check
        run: cargo check --all-targets --all-features

      - name: Verify checks are non-mutating (clean git tree)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error title=Checks modified files::One or more check steps modified the repository."
            git status --short
            git --no-pager diff -- . || true
            exit 1
          fi

  clippy:
    name: cargo clippy -D warnings
    runs-on: ubuntu-latest
    needs: [cargo-check]
    defaults:
      run:
        working-directory: src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: ${{ format('backend-rust-{0}-{1}', runner.os, hashFiles('src-tauri/Cargo.lock')) }}

      - name: cargo clippy (-D warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Verify checks are non-mutating (clean git tree)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error title=Checks modified files::One or more check steps modified the repository."
            git status --short
            git --no-pager diff -- . || true
            exit 1
          fi

  export-bindings-drift:
    name: export_bindings output up-to-date
    runs-on: ubuntu-latest
    needs: [cargo-check]
    defaults:
      run:
        working-directory: src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: ${{ format('backend-rust-{0}-{1}', runner.os, hashFiles('src-tauri/Cargo.lock')) }}

      - name: Run export_bindings generator test
        run: cargo test export_bindings -- --nocapture

      - name: Ensure generated backend bindings are committed
        run: |
          if ! git diff --exit-code -- ../src/core/backend/bindings.ts; then
            echo "::error title=Generated backend bindings out of date::Run: cd src-tauri && cargo test export_bindings -- --nocapture and commit src/core/backend/bindings.ts"
            exit 1
          fi

      - name: Verify checks are non-mutating (clean git tree)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error title=Checks modified files::One or more check steps modified the repository."
            git status --short
            git --no-pager diff -- . || true
            exit 1
          fi

  udeps:
    name: cargo udeps --all-targets
    runs-on: ubuntu-latest
    needs: [cargo-check]
    defaults:
      run:
        working-directory: src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: ${{ format('backend-rust-{0}-{1}', runner.os, hashFiles('src-tauri/Cargo.lock')) }}

      - name: Install nightly toolchain
        run: rustup toolchain install nightly --profile minimal

      - name: Install cargo-udeps on nightly
        run: rustup run nightly cargo install cargo-udeps --locked

      - name: cargo udeps (nightly)
        run: |
          export RUSTC="$(rustup which --toolchain nightly rustc)"
          rustup run nightly cargo udeps --all-targets

      - name: Verify checks are non-mutating (clean git tree)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error title=Checks modified files::One or more check steps modified the repository."
            git status --short
            git --no-pager diff -- . || true
            exit 1
          fi
