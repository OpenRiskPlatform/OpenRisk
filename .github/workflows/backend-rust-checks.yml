name: Backend

on:
  pull_request:
    paths:
      - "src-tauri/**"
      - "src/core/backend/bindings.ts"
      - "rust-toolchain.toml"
      - ".github/workflows/backend-rust-checks.yml"
  push:
    branches: ["main"]
    paths:
      - "src-tauri/**"
      - "src/core/backend/bindings.ts"
      - "rust-toolchain.toml"
      - ".github/workflows/backend-rust-checks.yml"

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: "1.94.0"

jobs:
  scope:
    name: scope
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      manifest_sync: ${{ steps.filter.outputs.manifest_sync }}
      client_sync: ${{ steps.filter.outputs.client_sync }}
      dead_deps: ${{ steps.filter.outputs.dead_deps }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed backend paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          list-files: shell
          filters: |
            rust:
              - 'src-tauri/**/*.rs'
              - 'src-tauri/Cargo.toml'
              - 'src-tauri/Cargo.lock'
              - 'rust-toolchain.toml'
            manifest_sync:
              - 'src-tauri/schemas/plugin-manifest.schema.json'
              - 'src-tauri/schemas/plugin-manifest.schema.rs'
            client_sync:
              - 'src-tauri/src/**/*.rs'
              - 'src-tauri/Cargo.toml'
              - 'src/core/backend/bindings.ts'
            dead_deps:
              - 'src-tauri/**/*.rs'
              - 'src-tauri/Cargo.toml'
              - 'src-tauri/Cargo.lock'

      - name: Print scope
        run: |
          echo "rust=${{ steps.filter.outputs.rust }}"
          echo "manifest_sync=${{ steps.filter.outputs.manifest_sync }}"
          echo "client_sync=${{ steps.filter.outputs.client_sync }}"
          echo "dead_deps=${{ steps.filter.outputs.dead_deps }}"
          echo "--- rust files ---"
          echo "${{ steps.filter.outputs.rust_files }}"
          echo "--- manifest files ---"
          echo "${{ steps.filter.outputs.manifest_sync_files }}"
          echo "--- client files ---"
          echo "${{ steps.filter.outputs.client_sync_files }}"
          echo "--- dead-deps files ---"
          echo "${{ steps.filter.outputs.dead_deps_files }}"

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: [scope]
    if: needs.scope.outputs.rust == 'true'
    defaults:
      run:
        working-directory: src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: ${{ format('backend-rust-{0}-{1}', runner.os, hashFiles('src-tauri/Cargo.lock')) }}

      - name: cargo check
        run: cargo check --all-targets --all-features

      - name: cargo clippy (-D warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Verify checks are non-mutating (clean git tree)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error title=Checks modified files::One or more check steps modified the repository."
            git status --short
            git --no-pager diff -- . || true
            exit 1
          fi

  format:
    name: format
    runs-on: ubuntu-latest
    needs: [scope, lint]
    if: |
      needs.scope.outputs.rust == 'true' &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped')
    defaults:
      run:
        working-directory: src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt

      - name: cargo fmt (check)
        run: cargo fmt --all -- --check

      - name: Verify checks are non-mutating (clean git tree)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error title=Checks modified files::One or more check steps modified the repository."
            git status --short
            git --no-pager diff -- . || true
            exit 1
          fi

  manifest_sync:
    name: manifest-sync
    runs-on: ubuntu-latest
    needs: [scope, format]
    if: |
      needs.scope.outputs.manifest_sync == 'true' &&
      (needs.format.result == 'success' || needs.format.result == 'skipped')
    defaults:
      run:
        working-directory: src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install cargo-typify (pinned)
        run: cargo install cargo-typify --version 0.5.0 --locked

      - name: Verify typify-generated schema is up-to-date (check-only)
        run: |
          tmp_file="$(mktemp)"
          trap 'rm -f "$tmp_file"' EXIT

          version="$(cargo-typify typify -V)"
          echo "Using $version"
          if [[ "$version" != "cargo-typify 0.5.0" ]]; then
            echo "::error title=Unexpected cargo-typify version::Expected cargo-typify 0.5.0, got $version"
            exit 1
          fi

          cargo-typify typify --no-builder schemas/plugin-manifest.schema.json -o "$tmp_file"

          if ! diff -u schemas/plugin-manifest.schema.rs "$tmp_file"; then
            echo "::error title=Generated schema out of date::Run: cd src-tauri && cargo typify --no-builder schemas/plugin-manifest.schema.json -o schemas/plugin-manifest.schema.rs and commit the result."
            exit 1
          fi

      - name: Verify checks are non-mutating (clean git tree)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error title=Checks modified files::One or more check steps modified the repository."
            git status --short
            git --no-pager diff -- . || true
            exit 1
          fi

  client_sync:
    name: client-sync
    runs-on: ubuntu-latest
    needs: [scope, manifest_sync]
    if: |
      needs.scope.outputs.client_sync == 'true' &&
      (needs.manifest_sync.result == 'success' || needs.manifest_sync.result == 'skipped')
    defaults:
      run:
        working-directory: src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: ${{ format('backend-rust-{0}-{1}', runner.os, hashFiles('src-tauri/Cargo.lock')) }}

      - name: Run export_bindings generator test
        run: cargo test export_bindings -- --nocapture

      - name: Ensure generated backend bindings are committed
        run: |
          if ! git diff --exit-code -- ../src/core/backend/bindings.ts; then
            echo "::error title=Generated backend bindings out of date::Run: cd src-tauri && cargo test export_bindings -- --nocapture and commit src/core/backend/bindings.ts"
            exit 1
          fi

      - name: Verify checks are non-mutating (clean git tree)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error title=Checks modified files::One or more check steps modified the repository."
            git status --short
            git --no-pager diff -- . || true
            exit 1
          fi

  dead_deps:
    name: dead-deps
    runs-on: ubuntu-latest
    needs: [scope, client_sync]
    if: |
      needs.scope.outputs.dead_deps == 'true' &&
      (needs.client_sync.result == 'success' || needs.client_sync.result == 'skipped')
    defaults:
      run:
        working-directory: src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libsqlite3-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: ${{ format('backend-rust-{0}-{1}', runner.os, hashFiles('src-tauri/Cargo.lock')) }}

      - name: Install nightly toolchain
        run: rustup toolchain install nightly --profile minimal

      - name: Install cargo-udeps on nightly
        run: rustup run nightly cargo install cargo-udeps --locked

      - name: cargo udeps (nightly)
        run: |
          export RUSTC="$(rustup which --toolchain nightly rustc)"
          rustup run nightly cargo udeps --all-targets

      - name: Verify checks are non-mutating (clean git tree)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error title=Checks modified files::One or more check steps modified the repository."
            git status --short
            git --no-pager diff -- . || true
            exit 1
          fi
